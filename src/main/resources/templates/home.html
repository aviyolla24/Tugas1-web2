<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-[#800000] via-[#5a0000] to-[#2b0000] text-white min-h-screen">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mx-auto px-6 py-28 text-center">

    <div class="bg-white rounded-3xl shadow-2xl p-16 border-l-8 border-[#800000] inline-block">

        <h2 class="text-5xl font-extrabold mb-6 text-[#800000]">
            Product Management System
        </h2>

        <p class="text-gray-600 mb-10 text-lg">
            MVC Pattern & Controller Layer
        </p>

        <a th:href="@{/products}"
           class="bg-[#800000] hover:bg-[#5a0000]
                  text-white font-bold px-10 py-4 rounded-xl
                  shadow-lg hover:scale-105 transition duration-300">
            Explore Products
        </a>

    </div>

</div>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
