<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>About</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-[#800000] via-[#5a0000] to-[#2b0000] text-white min-h-screen">

<!-- NAVIGATION -->
<nav class="bg-white/10 backdrop-blur-lg shadow-lg border-b border-white/20 mb-12">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-white tracking-wide">
            🌳 About
        </h1>
        <a th:href="@{/}"
           class="text-white hover:text-gray-200 font-medium transition duration-300">
            Home
        </a>
    </div>
</nav>

<div class="max-w-4xl mx-auto mt-10 px-6">

    <div class="bg-white rounded-3xl shadow-2xl p-10 border-l-8 border-[#800000]">

        <h1 class="text-4xl font-extrabold text-[#800000]"
            th:text="${appName}">App Name</h1>

        <p class="mt-6 text-lg text-gray-600">
            <strong class="text-gray-500">Version:</strong>
            <span class="text-[#800000] font-semibold"
                  th:text="${version}"></span>
        </p>

        <p class="mt-2 text-lg text-gray-600">
            <strong class="text-gray-500">Author:</strong>
            <span class="text-[#800000] font-semibold"
                  th:text="${author}"></span>
        </p>

        <h3 class="mt-8 text-2xl font-bold text-[#800000]">
            Technologies Used:
        </h3>

        <ul class="mt-4 space-y-3">
            <li class="bg-[#800000]/10 text-[#800000] px-5 py-3 rounded-xl font-semibold shadow-sm"
                th:each="tech : ${technologies}"
                th:text="${tech}">
                Technology
            </li>
        </ul>

        <a th:href="@{/}"
           class="inline-block mt-10 bg-[#800000] hover:bg-[#5a0000]
                  text-white font-bold px-8 py-3 rounded-xl
                  shadow-lg hover:scale-105 transform transition duration-300">
            Home
        </a>

    </div>

</div>

</body>
</html>
