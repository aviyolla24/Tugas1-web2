<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="relative bg-gradient-to-br from-[#800000] via-[#5a0000] to-[#2b0000] min-h-screen flex items-center justify-center overflow-hidden">

<!-- Decorative Glow -->
<div class="absolute w-96 h-96 bg-white/10 rounded-full blur-3xl top-10 left-10"></div>
<div class="absolute w-96 h-96 bg-[#800000]/40 rounded-full blur-3xl bottom-10 right-10"></div>

<!-- Card -->
<div class="relative bg-white/95 backdrop-blur-xl rounded-3xl shadow-[0_20px_60px_rgba(0,0,0,0.4)]
            px-20 py-16 text-center border border-white/40
            hover:scale-105 transform transition duration-500">

    <!-- Accent Line -->
    <div class="w-20 h-1 bg-gradient-to-r from-[#800000] to-[#5a0000] mx-auto mb-8 rounded-full"></div>

    <h1 th:text="${message}"
        class="text-5xl md:text-6xl font-extrabold
               bg-gradient-to-r from-[#800000] to-[#5a0000]
               bg-clip-text text-transparent tracking-wide drop-shadow-sm">
        Message
    </h1>

    <p class="mt-6 text-gray-500 text-lg">
        Dynamic Message Display
    </p>

</div>

</body>
</html>
