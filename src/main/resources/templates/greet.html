<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Greeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-[#800000] via-[#5a0000] to-[#2b0000] text-white min-h-screen">

<!-- NAVIGATION -->
<nav class="bg-white/10 backdrop-blur-lg shadow-lg border-b border-white/20 mb-16">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-white tracking-wide">
            Greeting
        </h1>
        <a th:href="@{/}"
           class="text-white hover:text-gray-200 font-medium transition duration-300">
            Home
        </a>
    </div>
</nav>

<div class="max-w-3xl mx-auto mt-20 px-6 text-center">

    <div class="bg-white rounded-3xl shadow-2xl p-12 border-l-8 border-[#800000]">

        <h1 th:text="${greeting}"
            class="text-4xl md:text-5xl font-extrabold text-[#800000]">
            Greeting
        </h1>

        <a th:href="@{/}"
           class="inline-block mt-10 bg-[#800000] hover:bg-[#5a0000]
                  text-white font-bold px-8 py-3 rounded-xl
                  shadow-lg hover:scale-105 transform transition duration-300">
            Home
        </a>

    </div>

</div>

</body>
</html>
