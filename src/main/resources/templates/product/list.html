<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-[#2b0000] via-[#800000] to-[#3d0000] text-white min-h-screen">

<nav class="bg-white/10 backdrop-blur-lg shadow-lg border-b border-white/20 mb-12">
    <div class="container mx-auto px-6 py-5 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-white tracking-wide">
            🐼 Products
        </h1>
        <a href="/" class="text-white hover:text-gray-200 font-medium transition duration-300">
            Home
        </a>
    </div>
</nav>

<div class="container mx-auto px-6 pb-20 space-y-8">

    <div th:each="product : ${products}"
         class="bg-white rounded-3xl shadow-2xl p-8
                hover:shadow-[0_20px_60px_rgba(0,0,0,0.4)]
                hover:scale-[1.02] transform transition duration-300">

        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6">

            <!-- LEFT CONTENT -->
            <div>
                <h3 class="text-2xl font-bold text-[#800000] mb-2"
                    th:text="${product.name}">
                </h3>

                <span class="inline-block bg-[#800000]/10 text-[#800000]
                             text-sm px-4 py-1 rounded-full font-semibold">
                    <span th:text="${product.category}"></span>
                </span>

                <p class="text-3xl font-extrabold text-[#5a0000] mt-4"
                   th:text="${product.price}">
                </p>
            </div>

            <!-- RIGHT BUTTON -->
            <div>
                <a th:href="@{/products/{id}(id=${product.id})}"
                   class="inline-block bg-[#800000]
                          hover:bg-[#5a0000]
                          text-white font-bold px-8 py-3
                          rounded-xl shadow-lg
                          hover:scale-105 transform transition duration-300">
                    View Detail →
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
