<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-[#800000] via-[#5a0000] to-[#2b0000] text-white min-h-screen">

<nav class="bg-white/10 backdrop-blur-lg shadow-lg border-b border-white/20 mb-12">
    <div class="container mx-auto px-6 py-5 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-white tracking-wide">
            Product Detail
        </h1>
        <a href="/products"
           class="text-white hover:text-gray-200 font-medium transition duration-300">
            Back
        </a>
    </div>
</nav>

<div class="container mx-auto px-6 py-20">
    <div class="max-w-2xl mx-auto bg-white
                p-12 rounded-3xl shadow-2xl
                border-l-8 border-[#800000]">

        <h1 class="text-4xl font-extrabold text-[#800000] mb-8"
            th:text="${product.name}">
        </h1>

        <p class="mb-4 text-gray-500 text-lg">
            Category:
            <span class="text-[#800000] font-semibold ml-2"
                  th:text="${product.category}"></span>
        </p>

        <p class="text-4xl font-bold text-[#5a0000] mb-10"
           th:text="${product.price}">
        </p>

        <p class="mb-10 text-lg">
            <span class="text-gray-500">Stock:</span>
            <span class="font-bold text-[#800000] text-2xl ml-2"
                  th:text="${product.stock}">
            </span>
        </p>

        <a href="/products"
           class="bg-[#800000] hover:bg-[#5a0000]
                  text-white font-bold
                  px-8 py-3 rounded-xl shadow-lg
                  hover:scale-105 transform transition duration-300">
            Back to List
        </a>

    </div>
</div>

</body>
</html>
