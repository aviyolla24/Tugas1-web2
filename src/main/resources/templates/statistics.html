<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Statistik</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-[#800000] via-[#5a0000] to-[#2b0000] text-white min-h-screen">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="max-w-5xl mx-auto mt-16 px-6">

    <div class="bg-white rounded-3xl shadow-2xl p-12 border-l-8 border-[#800000]">

        <h2 class="text-4xl font-extrabold text-[#800000]">Statistik Produk</h2>
        <hr class="my-6 border-gray-300">

        <p class="mt-4 text-lg text-gray-600">
            <strong class="text-gray-500">Total Produk:</strong>
            <span class="text-[#800000] font-bold"
                  th:text="${totalProducts}"></span>
        </p>

        <h5 class="mt-8 text-2xl font-bold text-[#800000]">
            Total Per Kategori:
        </h5>

        <ul class="mt-4 space-y-3">
            <li class="bg-[#800000]/10 text-[#800000] px-6 py-3 rounded-xl font-semibold shadow-sm"
                th:each="entry : ${totalPerCategory}">
                <span th:text="${entry.key}"></span> :
                <span th:text="${entry.value}"></span>
            </li>
        </ul>

        <div class="mt-10 space-y-3 text-lg text-gray-600">

            <p>
                <strong class="text-gray-500">Produk Termahal:</strong>
                <span class="text-[#800000] font-semibold"
                      th:text="${mostExpensive.name}"></span>
                (Rp <span class="font-bold text-[#5a0000]"
                          th:text="${mostExpensive.price}"></span>)
            </p>

            <p>
                <strong class="text-gray-500">Produk Termurah:</strong>
                <span class="text-[#800000] font-semibold"
                      th:text="${cheapest.name}"></span>
                (Rp <span class="font-bold text-[#5a0000]"
                          th:text="${cheapest.price}"></span>)
            </p>

            <p>
                <strong class="text-gray-500">Rata-rata Harga:</strong>
                Rp <span class="font-bold text-[#800000]"
                         th:text="${averagePrice}"></span>
            </p>

            <p>
                <strong class="text-gray-500">Jumlah Produk Stok &lt; 20:</strong>
                <span class="font-bold text-[#800000]"
                      th:text="${lowStockCount}"></span>
            </p>

        </div>

    </div>

</div>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
